name: Deploy Production

on:
  push:
    branches:
      - production

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || echo "No package.json yet, skipping npm ci"

      - name: Linting and Build
        run: |
          npx prisma generate --schema=apps/api/prisma/schema.prisma
          npm run lint --if-present
          npm run build --if-present

      - name: Backup & Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_SHA
          script: |
            echo "Starting Production Deployment..."
            mkdir -p /opt/seo_saas/production
            mkdir -p /opt/seo_saas/backups
            
            cd /opt/seo_saas/production
            
            BACKUP_NAME="prod_backup_$(date +%Y%m%d_%H%M%S).tar.gz"
            echo "Creating backup: $BACKUP_NAME"
            if [ -d ".git" ]; then
              tar -czf /opt/seo_saas/backups/$BACKUP_NAME . || echo "Backup warning"
              echo "Backup created successfully."
            else
              echo "First deploy, skipping backup."
            fi
            
            if [ ! -d ".git" ]; then
              git clone https://github.com/vaneeeek5/seo_saas.git .
            fi
            
            git fetch --all
            git checkout production
            git reset --hard origin/production
            
            echo "Production deployed successfully!"
