name: Deploy Staging

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || echo "No package.json yet, skipping npm ci"

      - name: Linting and Build
        run: |
          npm run lint --if-present
          npm run build --if-present

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Позволяет не проверять StrictHostKeyChecking (полезно для первого подключения)
          envs: GITHUB_SHA
          script: |
            echo "Deploying to Staging..."
            mkdir -p /opt/seo_saas/staging
            cd /opt/seo_saas/staging
            
            if [ ! -d ".git" ]; then
              git clone https://github.com/vaneeeek5/seo_saas.git .
            fi
            
            git fetch --all
            git checkout main
            git reset --hard origin/main
            
            # Заглушка для будущего деплоя
            # docker-compose -f docker-compose.staging.yml up -d --build
            echo "Staging deployed successfully!"
