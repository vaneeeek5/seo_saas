name: Auto Deploy to Server on Push

on:
  push:
    branches:
      - main
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client & Build Monorepo
        run: |
          npx prisma generate --schema=apps/api/prisma/schema.prisma
          npm run build --workspaces

      - name: Deploy via SSH (Key / Password)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '80.78.241.208'
          username: 'root'
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD || secrets.ROOT_PASSWORD || secrets.SERVER_PASSWORD || secrets.PASSWORD || secrets.VPS_PASSWORD }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          command_timeout: 30m
          script: |
            export DEBIAN_FRONTEND=noninteractive
            echo "🚀 [CI/CD] Connected to server 80.78.241.208 successfully!"
            
            TARGET_DIR="/var/www/seo_saas"
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR
            
            # Sync repository
            if [ -d ".git" ]; then
              echo "📥 Pulling latest commits from GitHub main..."
              git fetch --all
              git reset --hard origin/main
            else
              echo "📥 Cloning repository from GitHub..."
              git clone https://github.com/vaneeeek5/seo_saas.git .
            fi
            
            chmod +x scripts/setup-server.sh
            ./scripts/setup-server.sh
            
            echo "🐳 Launching Docker Compose stack..."
            docker compose down --remove-orphans || true
            docker compose up -d --build --force-recreate
            
            echo "🔍 Waiting 25s for web and api services to boot..."
            sleep 25
            
            echo "📊 Docker Container Status:"
            docker compose ps
            
            echo "🧪 Verifying Server Response:"
            curl -i http://localhost/health-check
            curl -i http://localhost:3000
            
            echo "🎉 [CI/CD] Automated Deployment Completed Successfully!"
